version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vimu-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-vimu_devs_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-vimu_devs_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vimu-backend
    restart: always
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./shared:/shared
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-admin}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-admin}
      - DB_NAME=${POSTGRES_DB:-vimu_devs_db}
      - JWT_SECRET=${JWT_SECRET:-super_secret_vimu_devs}
      - RESEND_API_KEY=${RESEND_API_KEY:-replace_me}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vimu-frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./shared:/shared
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  postgres_data:
