[build]
  base    = "frontend"
  command = "ng build --configuration production"
  publish = "dist/browser"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from   = "/api/contact"
  to     = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
