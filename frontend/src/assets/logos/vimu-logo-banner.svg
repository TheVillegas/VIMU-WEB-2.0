<svg width="520" height="620" viewBox="0 0 520 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VIMU DEVS - Logo Compacto</title>
  <desc id="desc">Logo compacto de VIMU DEVS con símbolo V conectado sobre el wordmark apilado.</desc>

  <defs>
    <linearGradient id="gold" x1="110" y1="55" x2="420" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8C95A"/>
      <stop offset="55%" stop-color="#F5B33C"/>
      <stop offset="100%" stop-color="#D89B2C"/>
    </linearGradient>
  </defs>

  <style>
    :root { --text-color: #ffffff; --node-bg: #111111; }
  </style>

  <g transform="translate(142 58)" stroke="url(#gold)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <path d="M28 28 L118 248 L208 28"/>
    <path d="M64 28 L140 220"/>
    <circle cx="28" cy="28" r="20" fill="var(--node-bg)" stroke="url(#gold)"/>
    <circle cx="208" cy="28" r="20" fill="var(--node-bg)" stroke="url(#gold)"/>
    <circle cx="118" cy="248" r="20" fill="var(--node-bg)" stroke="url(#gold)"/>
  </g>

  <g font-family="Montserrat, Poppins, Inter, Arial, sans-serif" font-weight="800" text-anchor="middle" letter-spacing="16">
    <text x="260" y="404" font-size="76" fill="var(--text-color)">VIMU</text>
    <text x="260" y="492" font-size="76" fill="url(#gold)">DEVS</text>
  </g>

  <text x="260" y="550"
        text-anchor="middle"
        font-family="Montserrat, Poppins, Inter, Arial, sans-serif"
        font-size="18"
        font-weight="500"
        letter-spacing="7"
        fill="var(--text-color)">
    TU PARTNER TECNOLÓGICO
  </text>
</svg>
