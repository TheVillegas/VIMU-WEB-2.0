<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VIMU DEVS Logo</title>
  <desc id="desc">Logo de VIMU DEVS con símbolo V conectado dorado y wordmark blanco/dorado.</desc>

  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8C95A"/>
      <stop offset="55%" stop-color="#F5B33C"/>
      <stop offset="100%" stop-color="#D89B2C"/>
    </linearGradient>
  </defs>

  <!-- Símbolo V conectada -->
  <g transform="translate(70 54)" stroke="url(#gold)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <path d="M28 28 L98 202 L170 28"/>
    <path d="M56 28 L116 178"/>
    <circle cx="28" cy="28" r="18" fill="#111111" stroke="url(#gold)"/>
    <circle cx="170" cy="28" r="18" fill="#111111" stroke="url(#gold)"/>
    <circle cx="98" cy="202" r="18" fill="#111111" stroke="url(#gold)"/>
  </g>

  <!-- Separador -->
  <line x1="300" y1="60" x2="300" y2="260" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>

  <!-- Wordmark -->
  <g font-family="Montserrat, Poppins, Inter, Arial, sans-serif" font-weight="800" letter-spacing="18">
    <text x="350" y="178" font-size="86" fill="#FFFFFF">VIMU</text>
    <text x="672" y="178" font-size="86" fill="url(#gold)">DEVS</text>
  </g>

  <!-- Subtítulo opcional de marca -->
  <text x="354" y="232"
        font-family="Montserrat, Poppins, Inter, Arial, sans-serif"
        font-size="27"
        font-weight="500"
        letter-spacing="13"
        fill="#FFFFFF">
    TU PARTNER TECNOLÓGICO
  </text>
</svg>
