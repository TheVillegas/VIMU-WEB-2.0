<header class="navbar" [class.navbar--scrolled]="scrolled()">
  <div class="navbar__inner container">
    <button type="button" class="navbar__logo" aria-label="Ir al inicio" (click)="scrollTo('inicio')">
      <img src="assets/logos/vimu-logo-banner-transparent.png" alt="VIMU DEVS" class="navbar__logo-img" />
    </button>

    <nav class="navbar__nav" aria-label="Navegaci&oacute;n principal">
      @for (link of navLinks; track link.label) {
        <button class="navbar__link" type="button" (click)="scrollTo(link.fragment)">
          {{ link.label }}
        </button>
      }
      <button type="button" class="navbar__cta" (click)="scrollTo('contacto')">
        Cotiza con nosotros
      </button>
    </nav>
  </div>
</header>
