<header class="navbar" [class.navbar--scrolled]="scrolled()">
  <div class="navbar__inner container">

    <a href="/" class="navbar__logo">VIMU DEVS</a>

    <nav class="navbar__nav" [class.navbar__nav--open]="menuOpen()">
      @for (link of navLinks; track link.label) {
        <button class="navbar__link" (click)="scrollTo(link.fragment)">
          {{ link.label }}
        </button>
      }
      <a href="#contacto" class="navbar__cta" (click)="scrollTo('contacto'); $event.preventDefault()">
        Agendar Llamada
      </a>
    </nav>

    <button class="navbar__hamburger" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()">
      <span class="navbar__bar" [class.navbar__bar--open]="menuOpen()"></span>
      <span class="navbar__bar" [class.navbar__bar--open]="menuOpen()"></span>
      <span class="navbar__bar" [class.navbar__bar--open]="menuOpen()"></span>
    </button>

  </div>
</header>
