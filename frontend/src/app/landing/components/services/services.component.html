<section class="services">
  <div class="services__wrapper">
    <header class="services__header">
      <span class="services__eyebrow">Capacidades</span>
      <h2 class="services__title">
        Consultoría Integral <br/>
        y Desarrollo de Élite.
      </h2>
    </header>

    <div class="services__grid">
      @for (service of services; track service.title) {
        <div class="services__card">
          <div class="services__card-icon">
            <div class="services__card-icon-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect width="16" height="16" x="4" y="4" rx="2"/>
                <rect width="6" height="6" x="9" y="9" rx="1"/>
                <path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/>
                <path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/>
                <path d="M9 20v2"/><path d="M9 2v2"/>
              </svg>
            </div>
          </div>
          <h3 class="services__card-title">{{ service.title }}</h3>
          <p class="services__card-description">{{ service.description }}</p>
          <ul class="services__card-list">
            @for (item of service.items; track item) {
              <li class="services__card-item">
                <div class="services__card-dot"></div>
                {{ item }}
              </li>
            }
          </ul>
        </div>
      }
    </div>
  </div>
</section>
