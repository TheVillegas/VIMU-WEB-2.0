<section class="services" id="servicios">
  <div class="services__inner container">

    <header class="services__header">
      <span class="services__eyebrow">Capacidades</span>
      <h2 class="services__title">
        Consultoría Integral<br>
        y Desarrollo de Élite.
      </h2>
    </header>

    <div class="services__grid">
      @for (service of services; track service.number) {
        <article class="services__card">
          <span class="services__card-number">{{ service.number }}</span>
          <h3 class="services__card-title">{{ service.title }}</h3>
          <p class="services__card-description">{{ service.description }}</p>
          <ul class="services__card-list">
            @for (item of service.items; track item) {
              <li class="services__card-item">
                <span class="services__card-dot"></span>
                {{ item }}
              </li>
            }
          </ul>
        </article>
      }
    </div>

  </div>
</section>
