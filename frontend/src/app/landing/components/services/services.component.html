<section class="services" id="servicios">
  <div class="services__inner container">

    <header class="services__header">
      <h2 class="services__title">Lo que hacemos</h2>
    </header>

    <div class="services__grid">
      @for (service of services; track service.number) {
        <article class="services__card">
          <div class="services__card-icon" aria-hidden="true">
            @if (service.icon === 'code') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 18 22 12 16 6" />
                <polyline points="8 6 2 12 8 18" />
              </svg>
            } @else if (service.icon === 'layers') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m12 2 9 5-9 5-9-5 9-5Z"/>
                <path d="m3 12 9 5 9-5"/>
                <path d="m3 17 9 5 9-5"/>
              </svg>
            } @else {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
              </svg>
            }
          </div>
          <span class="services__card-number">{{ service.number }}</span>
          <h3 class="services__card-title">{{ service.title }}</h3>
          <p class="services__card-description">{{ service.description }}</p>
        </article>
      }
    </div>

  </div>
</section>
