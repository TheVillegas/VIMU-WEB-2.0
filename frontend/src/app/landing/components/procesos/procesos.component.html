<section class="procesos" id="procesos">
  <div class="procesos__inner container">

    <header class="procesos__header">
      <h2 class="procesos__title">Cómo trabajamos</h2>
    </header>

    <div class="procesos__grid">
      @for (paso of pasos; track paso.number) {
        <div class="procesos__card">
          <span class="procesos__card-number">{{ paso.number }}</span>
          <h3 class="procesos__card-title">{{ paso.title }}</h3>
          <p class="procesos__card-description">{{ paso.description }}</p>
        </div>
      }
    </div>

  </div>
</section>
